<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a0533">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Blind Test">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>🎵 Blind Test Famille</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #1a0533;
    --text-color: #ffffff;
    --primary: #8b5cf6;
    --secondary: #ec4899;
  }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    overflow-x: hidden;
  }
  h1, h2, h3 { font-family: 'Syne', sans-serif; text-align: center; }
  .screen {
    display: none;
    padding: 20px;
    min-height: 100vh;
    box-sizing: border-box;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .screen.active { display: flex; }
  button {
    background: linear-gradient(45deg, var(--primary), var(--secondary));
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    margin: 10px;
    font-family: 'Inter', sans-serif;
    transition: transform 0.2s;
  }
  button:active { transform: scale(0.95); }
  input {
    padding: 15px;
    font-size: 1.2rem;
    border-radius: 10px;
    border: none;
    margin: 10px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
  #confettiWrap {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 9999; overflow: hidden;
  }
  .conf {
    position: absolute; top: -10px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); }
  }
</style>
</head>
<body>

<div id="confettiWrap"></div>

<!-- ECRAN ACCUEIL -->
<div id="screen-home" class="screen active">
  <h1>🎵 Blind Test Famille</h1>
  <button onclick="createGame()">Créer une partie (Maître du Jeu)</button>
  <p>ou</p>
  <input type="text" id="roomCodeInput" placeholder="CODE SALLE" maxlength="5">
  <button onclick="joinGame()">Rejoindre</button>
</div>

<!-- ECRAN LOBBY -->
<div id="screen-lobby" class="screen">
  <h2>Salle : <span id="lobbyRoomCode" style="color:var(--secondary)"></span></h2>
  <div id="playersList"></div>
  <button id="btnStartGame" style="display:none;" onclick="startGame()">Lancer la partie !</button>
</div>

<!-- ECRAN JEU -->
<div id="screen-game" class="screen">
  <h2 id="questionTitle">Préparez-vous...</h2>
  <div id="timerDisplay" style="font-size: 2rem; font-weight: bold; margin: 20px;"></div>
  <!-- Iframe Deezer (Maître du jeu uniquement) -->
  <div id="deezerPlayer" style="display:none;"></div>
  <div id="answerButtons" style="display:flex; flex-direction:column; width:100%; max-width:400px;"></div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, off, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyB1ixvhAm54aoRhdgUXpcl4CiLY6whZOnE",
  authDomain:"blind-test-piza.firebaseapp.com",
  databaseURL:"https://blind-test-piza-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"blind-test-piza",
  storageBucket:"blind-test-piza.firebasestorage.app",
  messagingSenderId:"984494870604",
  appId:"1:984494870604:web:5ee18abac40f5890b124e9"
});
const db = getDatabase(app);

// ── DB helpers ───────────────────────────────────────────
async function dbSet(p,v){ await set(ref(db,p),v); }
async function dbGet(p){ const s=await get(ref(db,p)); return s.exists()?s.val():null; }
function dbOn(p,cb){ const r=ref(db,p); onValue(r,s=>cb(s.exists()?s.val():null)); return r; }
function dbOff(r){ if(r) off(r); }

// ── LS helpers ───────────────────────────────────────────
const lsGet=k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const lsDel=k=>{try{localStorage.removeItem(k);}catch{}};

// ── CONSTANTS & UTILS ────────────────────────────────────
const ANSWER_TIME=20;
const AVATARS=['🦁','🐯','🦊','🐸','🐧','🦋','🐉','🦄'];
function genCode(){return Math.random().toString(36).substring(2,7).toUpperCase();}
function randAvatar(){return AVATARS[Math.floor(Math.random()*AVATARS.length)];}
function randItem(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ── GLOBAL STATE ─────────────────────────────────────────
window.G={
  isMJ:false, roomCode:null, room:null, player:null,
  timerInt:null, watchRef:null
};

// ── SCREEN ───────────────────────────────────────────────
window.show = function(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── CONFETTI ─────────────────────────────────────────────
window.launchConfetti = function(n=60){
  const wrap=document.getElementById('confettiWrap');
  wrap.innerHTML='';
  const colors=['#f97316','#ec4899','#8b5cf6','#10b981','#f59e0b','#3b82f6','#ef4444'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='conf';
    d.style.cssText=`
      left:${Math.random()*100}vw;
      background:${randItem(colors)};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${1.5+Math.random()*2}s;
      animation-delay:${Math.random()*0.5}s;
    `;
    wrap.appendChild(d);
  }
  setTimeout(()=>wrap.innerHTML='',4000);
}

// ── CLAUDE API ───────────────────────────────────────────
window.callClaude = async function(prompt){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': 'REMPLACE_CECI_PAR_TA_CLE_API_CLAUDE', 
        'anthropic-version': '2023-06-01',                 
        'anthropic-dangerously-allow-browser': 'true'      
      },
      body:JSON.stringify({
        model:'claude-3-5-sonnet-20240620', 
        max_tokens:1000,
        system:`Tu es le présentateur hilarant d'un blind test musical. Réponds TOUJOURS en JSON valide uniquement.`,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await r.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'{}';
    return JSON.parse(text.replace(/```json|
```/g,'').trim());
  }catch(e){
    console.error("Erreur Claude API:", e);
    return null;
  }
}

// ── GAME LOGIC (Bases) ───────────────────────────────────
window.createGame = async function() {
  G.isMJ = true;
  G.roomCode = genCode();
  await dbSet(`rooms/${G.roomCode}`, { status: 'lobby', players: {} });
  document.getElementById('lobbyRoomCode').innerText = G.roomCode;
  document.getElementById('btnStartGame').style.display = 'block';
  show('screen-lobby');
  watchRoom();
}

window.joinGame = async function() {
  const code = document.getElementById('roomCodeInput').value.toUpperCase();
  if(!code) return alert("Entre un code valide");
  const room = await dbGet(`rooms/${code}`);
  if(!room) return alert("Salle introuvable");
  
  G.roomCode = code;
  G.player = { id: genCode(), name: "Joueur", avatar: randAvatar(), score: 0 };
  await update(ref(db, `rooms/${G.roomCode}/players/${G.player.id}`), G.player);
  document.getElementById('lobbyRoomCode').innerText = G.roomCode;
  show('screen-lobby');
  watchRoom();
}

window.startGame = async function() {
  await update(ref(db, `rooms/${G.roomCode}`), { status: 'playing' });
}

function watchRoom() {
  G.watchRef = dbOn(`rooms/${G.roomCode}`, (data) => {
    if(!data) return;
    G.room = data;
    
    // Mise à jour de la liste des joueurs
    if(data.players) {
      document.getElementById('playersList').innerHTML = Object.values(data.players)
        .map(p => `<div>${p.avatar} ${p.name} - Score: ${p.score}</div>`).join('');
    }

    // Gestion des changements d'états
    if(data.status === 'playing' && document.getElementById('screen-game').classList.contains('active') === false) {
      show('screen-game');
      if(G.isMJ) document.getElementById('deezerPlayer').style.display = 'block';
    }
  });
}
</script>

<script>
// ── SERVICE WORKER ───────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .catch(err=>console.log('Erreur SW:',err));
  });
}
</script>
</body>
</html>
